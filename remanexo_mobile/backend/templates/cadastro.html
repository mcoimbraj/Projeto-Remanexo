{% extends 'base.html' %}

{% block titulo %}Cadastro - Remanexo{% endblock %}

{% block conteudo %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-body p-5">
                    <h2 class="card-title mb-4 text-center">Novo Cadastro</h2>
                    <p class="text-center text-muted mb-4">Crie sua conta no Remanexo</p>

                    {% if erro %}
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        {{ erro }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    {% endif %}

                    <form method="POST" action="{{ url_for('dashboard.cadastro') }}">
                        <div class="mb-3">
                            <label for="nome" class="form-label">Nome Completo</label>
                            <input
                                type="text"
                                class="form-control"
                                id="nome"
                                name="nome"
                                required
                                placeholder="Seu Nome"
                            >
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">E-mail</label>
                            <input
                                type="email"
                                class="form-control"
                                id="email"
                                name="email"
                                required
                                placeholder="seu@email.com"
                            >
                        </div>

                        <div class="mb-4">
                            <label for="senha" class="form-label">Senha</label>
                            <input
                                type="password"
                                class="form-control"
                                id="senha"
                                name="senha"
                                required
                                placeholder="••••••••"
                                minlength="6"
                            >
                            <small class="text-muted d-block mt-2">Mínimo 6 caracteres</small>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Criar Conta</button>
                    </form>

                    <hr class="my-4">

                    <p class="text-center text-muted mb-0">
                        Já tem conta? <a href="{{ url_for('dashboard.login') }}" class="text-decoration-none">Fazer login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
